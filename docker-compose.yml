services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quarterwatch
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Cloud Tasks Emulator ────────────────────────────────────────────────────
  tasks:
      image: ghcr.io/aertje/cloud-tasks-emulator:latest
      restart: unless-stopped
      ports:
        - "8123:8123"
      command: [
        "-host", "0.0.0.0",
        "-port", "8123",
        "-queue", "projects/local-project/locations/us-central1/queues/quarterwatch-jobs",
        
      ]

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/quarterwatch
      CLOUD_TASKS_EMULATOR_HOST: tasks:8123
      GCP_PROJECT_ID: local-project
      GCP_LOCATION: us-central1
      CLOUD_TASKS_QUEUE: quarterwatch-jobs
    depends_on:
      db:
        condition: service_healthy
      tasks:
        condition: service_started
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Worker ──────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/quarterwatch
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-credentials.json
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - ~/.config/quarterwatch/gcp-credentials.json:/run/secrets/gcp-credentials.json:ro

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
